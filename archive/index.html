<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tech Digest 归档</title>
  <meta name="description" content="Daily Tech Digest 历史归档页面。" />
  <style>
    :root {
      --bg: #0f1115;
      --paper: #151922;
      --paper-2: #1b2130;
      --ink: #edf2f7;
      --muted: #9aa5b5;
      --line: #2d3647;
      --accent: #67e8f9;
      --accent-2: #a78bfa;
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --maxw: 920px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; background: linear-gradient(180deg, #0b0d12, #121722 30%, #0f1115 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.75;
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 32px 18px 80px; }
    .hero, .card { background: rgba(21,25,34,0.92); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); }
    .hero { padding: 30px 26px; margin-bottom: 20px; }
    .card { padding: 22px 22px; }
    .eyebrow { display: inline-block; font-size: 12px; color: var(--accent); border: 1px solid rgba(103,232,249,0.28); border-radius: 999px; padding: 6px 12px; margin-bottom: 12px; }
    h1 { margin: 0 0 10px; font-size: 34px; letter-spacing: -0.02em; }
    p { margin: 0; color: var(--muted); }
    .list { margin-top: 18px; }
    .entry { display: block; padding: 16px 0; border-top: 1px dashed var(--line); color: inherit; text-decoration: none; }
    .entry:first-child { border-top: none; padding-top: 0; }
    .entry:hover h2 { text-decoration: underline; text-decoration-color: var(--accent); }
    .entry h2 { margin: 0 0 6px; font-size: 20px; color: var(--ink); }
    .entry .meta { font-size: 14px; color: var(--muted); }
    .home { display: inline-block; margin-top: 16px; color: var(--accent); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">Archive</div>
      <h1>Daily Tech Digest 归档</h1>
      <p>这里保留最近 30 期《Daily Tech Digest》。首页永远展示最新一期。</p>
      <a class="home" href="../index.html">← 返回首页</a>
    </section>

    <section class="card list">
      <a class="entry" href="./2026-03-11.html">
        <h2>2026-03-11｜Daily Tech Digest</h2>
        <div class="meta">公开归档版本</div>
      </a>
    </section>
  </main>
</body>
</html>
